name: Keep-Alive (prevent GitHub disabling scheduled workflows)

# GitHub silently disables scheduled workflows on repos with no recent
# human activity (roughly 60 days of inactivity).  This workflow commits
# a small timestamp file every Sunday so the repo always looks "active"
# and the morning-report.yml schedule keeps firing every weekday.

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 06:00 UTC
  workflow_dispatch:        # Run manually anytime from Actions tab

permissions:
  contents: write

jobs:
  keepalive:
    name: Commit weekly timestamp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/agent-tools-edgar-setup-PimAK
          fetch-depth: 1

      - name: Write timestamp and commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull first to avoid push rejection if there were other commits
          git pull --rebase origin claude/agent-tools-edgar-setup-PimAK || true

          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > .keepalive
          git add .keepalive

          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "keepalive: $(date -u +%Y-%m-%d) — keep scheduled workflows active"
            git push -u origin claude/agent-tools-edgar-setup-PimAK
            echo "✓ Keep-alive commit pushed."
          fi
