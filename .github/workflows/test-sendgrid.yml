name: Test SendGrid Email

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug     # full diagnostic: key check + sender status + force test email (USE THIS FIRST)
          - test      # send a live test email → marklangston3@gmail.com + Langstonroy@aol.com
          - check     # list verified senders and status
          - register  # register marklangston3@gmail.com as a verified sender
          - resend    # resend the verification email if it expired

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  sendgrid:
    name: SendGrid — ${{ github.event.inputs.action || 'debug' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: claude/agent-tools-edgar-setup-PimAK

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No pip install needed — both scripts use stdlib only

      # ── 3. Run action ─────────────────────────────────────────────────────────
      - name: Run SendGrid action
        id: sendgrid
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          ACTION="${{ github.event.inputs.action || 'debug' }}"
          echo "=== Action: ${ACTION} ==="
          echo ""

          if [ "$ACTION" = "debug" ]; then
            # Full diagnostic: API key → verified senders → force test email
            echo "Running debug_sendgrid.py — full diagnostic + force test email"
            python debug_sendgrid.py
            EXIT=$?

          else
            # Individual verify_sender.py actions
            echo "Running verify_sender.py --${ACTION}"
            python verify_sender.py --${ACTION}
            EXIT=$?

            # After registering, always show current sender status
            if [ "$ACTION" = "register" ]; then
              echo ""
              echo "=== Current sender status after registration ==="
              python verify_sender.py --check
            fi
          fi

          exit $EXIT

      # ── 4. Summary ───────────────────────────────────────────────────────────
      - name: Write step summary
        if: always()
        run: |
          ACTION="${{ github.event.inputs.action || 'debug' }}"
          echo "### SendGrid — \`${ACTION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          case "$ACTION" in
            debug)
              echo "Full diagnostic run via **debug_sendgrid.py**." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Checks performed:" >> $GITHUB_STEP_SUMMARY
              echo "1. SENDGRID_API_KEY present and well-formed" >> $GITHUB_STEP_SUMMARY
              echo "2. GET /verified_senders — sender identity status" >> $GITHUB_STEP_SUMMARY
              echo "3. POST /mail/send — force test email with full response" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Check the step log above for the full SendGrid API response." >> $GITHUB_STEP_SUMMARY
              echo "If the step **failed**, look for \`HTTP 4xx\` lines in the log." >> $GITHUB_STEP_SUMMARY
              ;;
            test)
              echo "A test email was sent to **marklangston3@gmail.com** and **Langstonroy@aol.com**." >> $GITHUB_STEP_SUMMARY
              echo "Check both inboxes (and spam) — arrives within 1–2 minutes." >> $GITHUB_STEP_SUMMARY
              ;;
            check)
              echo "Verified sender list printed in the step log above." >> $GITHUB_STEP_SUMMARY
              echo "If **marklangston3@gmail.com** shows \`PENDING\`, click the verification link." >> $GITHUB_STEP_SUMMARY
              ;;
            register)
              echo "Sender registration submitted." >> $GITHUB_STEP_SUMMARY
              echo "Check **marklangston3@gmail.com** for the SendGrid verification email and click the link." >> $GITHUB_STEP_SUMMARY
              ;;
            resend)
              echo "Verification email re-sent to **marklangston3@gmail.com**." >> $GITHUB_STEP_SUMMARY
              ;;
          esac
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| From | marklangston3@gmail.com |" >> $GITHUB_STEP_SUMMARY
          echo "| To | marklangston3@gmail.com, Langstonroy@aol.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
