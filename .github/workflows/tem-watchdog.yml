name: EDGAR DCF Watchdog  (TEM · RGTI · BBAI)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # 7 am EST (UTC-5) = 12:00 UTC
    # During EDT (UTC-4) this fires at 8 am EDT — acceptable one-hour drift
    - cron: '0 12 * * *'

  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if no new filings detected'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      ticker:
        description: 'Single ticker to rebuild (leave blank for all: TEM, RGTI, BBAI)'
        required: false
        default: ''
        type: string

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed for watchdog.py to git push

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  watchdog:
    name: Check EDGAR & Rebuild DCF Models
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo (working branch)
        uses: actions/checkout@v4
        with:
          ref: claude/agent-tools-edgar-setup-PimAK
          # persist-credentials=true (default) lets watchdog.py push via git
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Git identity (required for watchdog.py's git commit) ──────────────
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. Run watchdog ───────────────────────────────────────────────────────
      - name: Run watchdog.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FLAGS="$FLAGS --force"; fi
          if [ -n "${{ github.event.inputs.ticker }}" ]; then FLAGS="$FLAGS --ticker ${{ github.event.inputs.ticker }}"; fi
          python watchdog.py $FLAGS

      # ── 5. Check if rebuild was triggered & set output ────────────────────────
      - name: Check rebuild summary
        id: check_rebuild
        if: always()
        run: |
          if [ -f ".rebuild_summary.json" ]; then
            TRIGGERED=$(python -c "import json; d=json.load(open('.rebuild_summary.json')); print('true' if d.get('triggered') else 'false')" 2>/dev/null || echo "false")
            TICKERS=$(python -c "import json; d=json.load(open('.rebuild_summary.json')); print(', '.join(d.get('rebuilds',[])) or 'none')" 2>/dev/null || echo "none")
            FILINGS=$(python -c "
          import json
          d=json.load(open('.rebuild_summary.json'))
          lines=[f\"{f['form']} {f['ticker']} ({f['date']})\" for f in d.get('filings',[])]
          print('; '.join(lines) or 'forced rebuild')
          " 2>/dev/null || echo "unknown")
          else
            TRIGGERED="false"
            TICKERS="none"
            FILINGS="none"
          fi
          echo "triggered=$TRIGGERED"  >> $GITHUB_OUTPUT
          echo "tickers=$TICKERS"      >> $GITHUB_OUTPUT
          echo "filings=$FILINGS"      >> $GITHUB_OUTPUT
          echo "Rebuild triggered: $TRIGGERED — Tickers: $TICKERS — Filings: $FILINGS"

      # ── 6. Send email notification via SendGrid (only when filing detected) ───
      # Requires SENDGRID_API_KEY secret (Settings → Secrets → Actions).
      # SENDGRID_FROM_EMAIL must be a sender verified in your SendGrid account
      # (Settings → Sender Authentication → Single Sender Verification).
      - name: Send model update notification
        if: steps.check_rebuild.outputs.triggered == 'true'
        env:
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          api_key    = os.environ.get("SENDGRID_API_KEY",    "").strip()
          from_email = os.environ.get("SENDGRID_FROM_EMAIL", "marklangston3@gmail.com").strip()
          to_email   = "marklangston3@gmail.com"
          tickers    = "${{ steps.check_rebuild.outputs.tickers }}"
          filings    = "${{ steps.check_rebuild.outputs.filings }}"
          run_id     = "${{ github.run_id }}"
          event_name = "${{ github.event_name }}"

          if not api_key:
              print("SENDGRID_API_KEY not set — skipping email notification.")
              raise SystemExit(0)

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"></head>
          <body style="font-family:Arial,Helvetica,sans-serif;color:#1A202C;max-width:600px;margin:0 auto">
            <div style="background:#002F5F;padding:20px 24px;border-bottom:3px solid #C9A84C">
              <h2 style="color:white;margin:0;font-size:17px;letter-spacing:1px">
                LANGSTON'S FINANCIAL INTELLIGENCE
              </h2>
              <p style="color:#A8C8F0;margin:4px 0 0;font-size:12px">
                EDGAR WATCHDOG &nbsp;&middot;&nbsp; DCF MODEL UPDATE ALERT
              </p>
            </div>
            <div style="padding:20px 24px;background:white">
              <h3 style="color:#002F5F;margin-top:0">New SEC Filing Detected — Models Rebuilt</h3>
              <table style="width:100%;border-collapse:collapse;font-size:13px">
                <tr>
                  <td style="padding:9px 8px;font-weight:bold;color:#4A5568;background:#EEF1F6;
                             width:35%">Tickers Updated</td>
                  <td style="padding:9px 8px"><b>{tickers}</b></td>
                </tr>
                <tr>
                  <td style="padding:9px 8px;font-weight:bold;color:#4A5568;background:#EEF1F6">
                    Filing(s)</td>
                  <td style="padding:9px 8px">{filings}</td>
                </tr>
                <tr>
                  <td style="padding:9px 8px;font-weight:bold;color:#4A5568;background:#EEF1F6">
                    Action Taken</td>
                  <td style="padding:9px 8px">
                    DCF workbook(s) rebuilt from latest XBRL data and pushed to repository.
                  </td>
                </tr>
                <tr>
                  <td style="padding:9px 8px;font-weight:bold;color:#4A5568;background:#EEF1F6">
                    Run</td>
                  <td style="padding:9px 8px;font-size:12px;color:#4A5568">
                    {run_id} &nbsp;&middot;&nbsp; {event_name}
                  </td>
                </tr>
              </table>
              <p style="margin-top:20px">
                <a href="https://github.com/marklangston3-glitch/modelingagent1"
                   style="background:#002F5F;color:white;padding:10px 20px;
                          text-decoration:none;border-radius:4px;font-size:13px">
                  View Updated Models &rarr;
                </a>
              </p>
            </div>
            <div style="padding:12px 24px;background:#EEF1F6;font-size:10px;color:#B0BAC9">
              Langston's Financial Intelligence &nbsp;&middot;&nbsp; EDGAR Watchdog
              &nbsp;&middot;&nbsp; Automated alert — not investment advice.
            </div>
          </body></html>"""

          payload = {
              "personalizations": [{"to": [{"email": to_email}]}],
              "from": {"email": from_email, "name": "Langston's Financial Intelligence"},
              "subject": f"Langston's Model Update — New SEC Filing: {tickers}",
              "content": [{"type": "text/html", "value": html}],
          }

          req = urllib.request.Request(
              "https://api.sendgrid.com/v3/mail/send",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type":  "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(f"SendGrid: email sent (HTTP {resp.status})")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode(errors="replace")
              print(f"SendGrid HTTP {exc.code}: {body[:400]}")
              # Non-fatal: print the error but don't fail the workflow step
          except Exception as exc:
              print(f"SendGrid error: {exc}")
          PYEOF

      # ── 7. Show tail of log in Actions summary ────────────────────────────────
      - name: Print watchdog log (last 80 lines)
        if: always()
        run: |
          echo "### watchdog.log (last 80 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 watchdog.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 8. Upload log as artifact (30-day retention) ──────────────────────────
      - name: Upload watchdog log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-log-${{ github.run_id }}
          path: |
            watchdog.log
            .rebuild_summary.json
          retention-days: 30
