name: Deploy GitHub Pages Dashboard

# Deploys docs/ to GitHub Pages.
#
# This workflow is for MANUAL re-deploys only.
# Automated deployment happens at the end of every morning-report.yml run
# (steps 9-11 in that workflow).  Keeping this separate push trigger removed
# so it does not race with morning-report.yml for the same Pages environment.
#
# One-time repo setup (do this once):
#   Settings → Pages → Source → GitHub Actions
#
# After the first successful deploy the dashboard URL will be:
#   https://marklangston3-glitch.github.io/Modelingagent1/

on:
  # Run manually from the Actions tab at any time (e.g. to force a re-deploy)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-progress deployment when a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy docs/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout the working branch ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/agent-tools-edgar-setup-PimAK
          fetch-depth: 1

      # ── 2. Upload docs/ as the Pages artifact ─────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      # ── 3. Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── 4. Print the live URL in the Actions summary ──────────────────────
      - name: Print dashboard URL
        run: |
          echo "### ✅ Dashboard deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **${{ steps.deploy.outputs.page_url }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard auto-updates every weekday morning when \`morning_report.py\` pushes new \`docs/dashboard_data.json\`." >> $GITHUB_STEP_SUMMARY
