name: Morning Intelligence Report  (TEM · RGTI · BBAI · NEE)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # 7:15 am EST (UTC-5) = 12:15 UTC  — runs after watchdog.py (12:00 UTC)
    # During EDT (UTC-4) this fires at 8:15 am EDT — acceptable drift
    - cron: '15 12 * * 1-5'   # weekdays only (markets closed Sat/Sun)

  # Allow manual runs with optional overrides
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to report on (leave blank for all)'
        required: false
        default: ''
        type: string
      no_push:
        description: 'Build PDF without pushing to repo'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_email:
        description: 'Skip SendGrid email delivery'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

  # Push .trigger_morning_report to fire an immediate run on demand.
  push:
    branches:
      - main
    paths:
      - '.trigger_morning_report'

# ── Job 1: Generate PDF + email ───────────────────────────────────────────────
# No environment gate here — this job runs unconditionally so the report and
# email are never blocked by github-pages environment protection rules.
jobs:
  report:
    name: Generate Morning Report PDF
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # morning_report.py pushes the PDF via git

    outputs:
      date_tag: ${{ steps.generate.outputs.date_tag }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Git identity ───────────────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. SendGrid pre-flight ────────────────────────────────────────────────
      - name: SendGrid pre-flight (sender status)
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          echo "### SendGrid Pre-flight Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "SENDGRID_API_KEY: NOT SET — email delivery will be skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "SENDGRID_API_KEY: SET (prefix: ${SENDGRID_API_KEY:0:8}…)" >> $GITHUB_STEP_SUMMARY
            python verify_sender.py --check >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 5. Generate report ────────────────────────────────────────────────────
      - name: Run morning_report.py
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
        run: |
          DATE_TAG=$(python -c "from datetime import datetime,timezone; print(datetime.now(timezone.utc).strftime('%Y-%m-%d'))")
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${DATE_TAG}"

          FLAGS="--no-email"
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            FLAGS="$FLAGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ "${{ github.event.inputs.no_push }}" = "true" ]; then
            FLAGS="$FLAGS --no-push"
          fi
          python morning_report.py $FLAGS

      # ── 6. Email via SendGrid ─────────────────────────────────────────────────
      - name: Email morning report via SendGrid
        if: success() && github.event.inputs.no_email != 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python send_morning_email.py --date "${{ steps.generate.outputs.date_tag }}"

      # ── 7. Print log ──────────────────────────────────────────────────────────
      - name: Print report log (last 100 lines)
        if: always()
        run: |
          echo "### morning_report.log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 morning_report.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(log not found)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 8. Upload PDF + log artifacts (30-day) ────────────────────────────────
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_id }}
          path: |
            reports/morning_report_*.pdf
            morning_report.log
          retention-days: 30

      # ── 9. Stage dashboard for Pages (artifact only, no deploy yet) ───────────
      # actions/deploy-pages in the next job picks this up automatically.
      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

# ── Job 2: Deploy GitHub Pages ────────────────────────────────────────────────
# Separate job so environment protection on github-pages never blocks
# report generation or email delivery.  continue-on-error at job level
# means the overall workflow is green when the report succeeds, even if
# Pages is misconfigured.
  deploy-pages:
    name: Deploy GitHub Pages Dashboard
    needs: report
    if: needs.report.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    permissions:
      pages:    write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Print dashboard URL
        if: always()
        run: |
          if [ "${{ steps.deploy-pages.outcome }}" = "success" ]; then
            echo "### ✅ Dashboard deployed" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **${{ steps.deploy-pages.outputs.page_url }}**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Pages deploy failed — report + email still delivered" >> $GITHUB_STEP_SUMMARY
            echo "Fix: Settings → Environments → github-pages → add main to allowed branches" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Report date: **${{ needs.report.outputs.date_tag }}**" >> $GITHUB_STEP_SUMMARY
