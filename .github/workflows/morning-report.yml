name: Morning Intelligence Report  (TEM · RGTI · BBAI · NEE)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # 7:15 am EST (UTC-5) = 12:15 UTC  — runs after watchdog.py (12:00 UTC)
    # During EDT (UTC-4) this fires at 8:15 am EDT — acceptable drift
    - cron: '15 12 * * 1-5'   # weekdays only (markets closed Sat/Sun)

  # Allow manual runs with optional overrides
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to report on (leave blank for all: TEM, RGTI, BBAI, NEE)'
        required: false
        default: ''
        type: string
      no_push:
        description: 'Build PDF without pushing to repo'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_email:
        description: 'Skip SendGrid email delivery'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

  # Push .trigger_morning_report to fire an immediate manual run without
  # opening GitHub Actions in a browser.  This file is how we kick the
  # workflow on-demand (e.g. "run today's report right now").
  push:
    branches:
      - main
    paths:
      - '.trigger_morning_report'

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # morning_report.py pushes the PDF via git
  pages:    write   # deploy dashboard at end of every run
  id-token: write   # OIDC token required for actions/deploy-pages

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  report:
    name: Generate Morning Report PDF
    runs-on: ubuntu-latest
    timeout-minutes: 30   # prospect_finder adds ~10 min on full runs
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      # ── 1. Checkout (fresh — picks up any watchdog commits from 12:00 run) ───
      - name: Checkout repo (working branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Git identity (morning_report.py pushes the PDF) ───────────────────
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. SendGrid pre-flight check ─────────────────────────────────────────
      - name: SendGrid pre-flight (sender status)
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          echo "### SendGrid Pre-flight Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "SENDGRID_API_KEY: NOT SET — email delivery will be skipped." >> $GITHUB_STEP_SUMMARY
            echo "  Add it: GitHub → Settings → Secrets → Actions → New repository secret" >> $GITHUB_STEP_SUMMARY
          else
            echo "SENDGRID_API_KEY: SET (prefix: ${SENDGRID_API_KEY:0:8}…)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python verify_sender.py --check >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 5. Generate report ───────────────────────────────────────────────────
      # date_tag is captured here and forwarded to the email step so both steps
      # always target the same calendar date (eliminates UTC midnight edge cases).
      - name: Run morning_report.py
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
        run: |
          # Capture the UTC date at the start of this step.
          DATE_TAG=$(python -c "from datetime import datetime,timezone; print(datetime.now(timezone.utc).strftime('%Y-%m-%d'))")
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${DATE_TAG}"

          FLAGS="--no-email"   # email is handled by the dedicated step below
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            FLAGS="$FLAGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ "${{ github.event.inputs.no_push }}" = "true" ]; then
            FLAGS="$FLAGS --no-push"
          fi
          python morning_report.py $FLAGS

      # ── 6. Email the combined PDF via SendGrid ────────────────────────────────
      # --date pins the PDF lookup to the exact date generated in step 5.
      # send_morning_email.py exits 1 if no PDF from that date is found — step
      # turns red rather than silently attaching a stale report from a prior run.
      # Each recipient in recipients.txt gets its own independent SendGrid send
      # (separate personalizations) so Gmail FROM==TO suppression does not drop
      # delivery to marklangston3@gmail.com.
      - name: Email morning report via SendGrid
        if: success() && github.event.inputs.no_email != 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python send_morning_email.py --date "${{ steps.generate.outputs.date_tag }}"

      # ── 7. Show log in Actions summary ───────────────────────────────────────
      - name: Print report log (last 100 lines)
        if: always()
        run: |
          echo "### morning_report.log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 morning_report.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(log not found)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 8. Upload PDF + log as artifacts (30-day retention) ──────────────────
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_id }}
          path: |
            reports/morning_report_*.pdf
            morning_report.log
          retention-days: 30

      # ── 9. Deploy GitHub Pages dashboard ─────────────────────────────────────
      # CRITICAL: GITHUB_TOKEN pushes inside Actions do NOT trigger push-based
      # workflows (GitHub prevents this to avoid infinite loops).  That means
      # morning_report.py's git push of dashboard_data.json never activates
      # pages.yml.  Fix: deploy Pages directly here, every successful run.
      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy-pages
        if: success()
        uses: actions/deploy-pages@v4

      - name: Print dashboard URL
        if: success()
        run: |
          echo "### ✅ Dashboard deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **${{ steps.deploy-pages.outputs.page_url }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report date: **${{ steps.generate.outputs.date_tag }}**" >> $GITHUB_STEP_SUMMARY
