name: Morning Intelligence Report  (TEM · RGTI · BBAI)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # 7:15 am EST (UTC-5) = 12:15 UTC  — runs after watchdog.py (12:00 UTC)
    # During EDT (UTC-4) this fires at 8:15 am EDT — acceptable drift
    - cron: '15 12 * * 1-5'   # weekdays only (markets closed Sat/Sun)

  # Allow manual runs with optional overrides
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Single ticker to report on (leave blank for all: TEM, RGTI, BBAI)'
        required: false
        default: ''
        type: string
      no_push:
        description: 'Build PDF without pushing to repo'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_email:
        description: 'Skip SendGrid email delivery'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # morning_report.py pushes the PDF via git

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  report:
    name: Generate Morning Report PDF
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout (fresh — picks up any watchdog commits from 12:00 run) ───
      - name: Checkout repo (working branch)
        uses: actions/checkout@v4
        with:
          ref: claude/agent-tools-edgar-setup-PimAK
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Git identity (morning_report.py pushes the PDF) ───────────────────
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 4. SendGrid pre-flight check ─────────────────────────────────────────
      # Checks API key presence + sender verification status before the main run.
      # Failures here are non-fatal: the report PDF still builds even if email
      # will fail. Check this step's output to diagnose delivery issues.
      - name: SendGrid pre-flight (sender status)
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          echo "### SendGrid Pre-flight Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "SENDGRID_API_KEY: NOT SET — email delivery will be skipped." >> $GITHUB_STEP_SUMMARY
            echo "  Add it: GitHub → Settings → Secrets → Actions → New repository secret" >> $GITHUB_STEP_SUMMARY
          else
            echo "SENDGRID_API_KEY: SET (prefix: ${SENDGRID_API_KEY:0:8}…)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python verify_sender.py --check >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 5. Generate report ───────────────────────────────────────────────────
      # FROM address (marklangston3@gmail.com) is hardcoded in morning_report.py.
      # Verify it once with: python verify_sender.py --register
      # If SENDGRID_API_KEY is absent, email is skipped silently; PDF still builds.
      - name: Run morning_report.py
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
        run: |
          FLAGS="--no-email"   # email is handled by the dedicated step below
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            FLAGS="$FLAGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ "${{ github.event.inputs.no_push }}" = "true" ]; then
            FLAGS="$FLAGS --no-push"
          fi
          python morning_report.py $FLAGS

      # ── 6. Email the combined PDF via SendGrid ────────────────────────────────
      # Runs only when the report step succeeded AND no_email is not 'true'.
      # Uses a simple, robust inline script — no dependency on morning_report.py
      # internals. Exits non-zero on API error so the step shows red in Actions.
      - name: Email morning report via SendGrid
        if: success() && github.event.inputs.no_email != 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python - <<'PYEOF'
import base64, glob, json, os, sys, urllib.request, urllib.error
from datetime import datetime, timezone

api_key = os.environ.get("SENDGRID_API_KEY", "").strip()
if not api_key:
    print("SENDGRID_API_KEY not set — skipping email delivery.")
    print("  Add the secret: GitHub → Settings → Secrets → Actions → SENDGRID_API_KEY")
    sys.exit(0)   # non-fatal: PDF is already pushed to the repo

date_utc    = datetime.now(timezone.utc)
date_tag    = date_utc.strftime("%Y-%m-%d")            # e.g. 2026-05-26
date_pretty = date_utc.strftime("%B %d, %Y")           # e.g. May 26, 2026

# ── Find the combined PDF for today ──────────────────────────────────────────
pdf_path = f"reports/morning_report_{date_tag}.pdf"
if not os.path.exists(pdf_path):
    # Single-ticker run or date mismatch — grab the newest morning_report_*.pdf
    matches = sorted(glob.glob("reports/morning_report_*.pdf"))
    if not matches:
        print(f"No combined PDF found under reports/ for {date_tag} — skipping email.")
        sys.exit(0)
    pdf_path = matches[-1]

with open(pdf_path, "rb") as fh:
    encoded  = base64.b64encode(fh.read()).decode()
pdf_kb   = os.path.getsize(pdf_path) / 1024
filename = os.path.basename(pdf_path)

subject  = f"Langston's Morning Intelligence Brief — {date_pretty}"

# ── Plain-text email body ─────────────────────────────────────────────────────
text_body = f"""\
Langston's Financial Intelligence — Morning Brief  {date_pretty}

Your pre-market equity research report is attached as a PDF.

The combined report covers: TEM · RGTI · BBAI · NEE (and any other tickers
in tickers.txt).  Each ticker gets a two-page write-up:
  Page 1: Company update, rating, price target, and key catalysts.
  Page 2: Price outlook, scenario analysis, and investment strategy.

A front-page conviction-ranking table summarises every position.

—
Langston's Financial Intelligence | AI-generated | Not investment advice.
"""

# ── Simple branded HTML body ──────────────────────────────────────────────────
html_body = f"""\
<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="font-family:Arial,Helvetica,sans-serif;color:#1A202C;max-width:640px;margin:0 auto">

  <div style="background:#002F5F;padding:22px 28px;border-bottom:3px solid #C9A84C">
    <h1 style="color:white;margin:0;font-size:18px;letter-spacing:1px">
      LANGSTON&rsquo;S FINANCIAL INTELLIGENCE</h1>
    <p style="color:#A8C8F0;margin:5px 0 0;font-size:12px">
      MORNING INTELLIGENCE BRIEF &nbsp;&middot;&nbsp; EQUITY RESEARCH
      &nbsp;&middot;&nbsp; {date_pretty.upper()}</p>
  </div>

  <div style="padding:20px 28px;background:#EEF1F6;border-bottom:1px solid #CDD3DF">
    <p style="margin:0;font-size:13px;color:#4A5568">
      Your pre-market equity research brief is attached as a PDF.
      The combined report includes a front-page conviction ranking table
      plus a two-page write-up per ticker (TEM &middot; RGTI &middot; BBAI &middot; NEE).</p>
  </div>

  <div style="padding:20px 28px;background:white">
    <table style="width:100%;border-collapse:collapse;font-size:12px;color:#4A5568">
      <tr>
        <td style="padding:8px 0;border-bottom:1px solid #EEF1F6;font-weight:bold;width:30%">Report date</td>
        <td style="padding:8px 0;border-bottom:1px solid #EEF1F6">{date_pretty}</td>
      </tr>
      <tr>
        <td style="padding:8px 0;border-bottom:1px solid #EEF1F6;font-weight:bold">Attachment</td>
        <td style="padding:8px 0;border-bottom:1px solid #EEF1F6">{filename} &nbsp;({pdf_kb:.0f} KB)</td>
      </tr>
      <tr>
        <td style="padding:8px 0;font-weight:bold">Coverage</td>
        <td style="padding:8px 0">TEM &middot; RGTI &middot; BBAI &middot; NEE
            &nbsp;(per tickers.txt)</td>
      </tr>
    </table>
  </div>

  <div style="padding:14px 28px;background:#002F5F">
    <p style="color:#A8C8F0;margin:0;font-size:10px">
      Langston&rsquo;s Financial Intelligence &nbsp;&middot;&nbsp; AI-generated
      &nbsp;&middot;&nbsp; Not investment advice.</p>
  </div>

</body></html>
"""

# ── SendGrid payload ──────────────────────────────────────────────────────────
payload = {
    "personalizations": [{"to": [
        {"email": "marklangston3@gmail.com"},
        {"email": "Langstonroy@aol.com"},
    ]}],
    "from":    {"email": "marklangston3@gmail.com", "name": "Langston's Research"},
    "subject": subject,
    "content": [
        {"type": "text/plain", "value": text_body},
        {"type": "text/html",  "value": html_body},
    ],
    "attachments": [{
        "content":     encoded,
        "type":        "application/pdf",
        "filename":    filename,
        "disposition": "attachment",
    }],
}
raw = json.dumps(payload).encode()

# ── Send ──────────────────────────────────────────────────────────────────────
print(f"SendGrid POST /v3/mail/send")
print(f"  key     : {api_key[:8]}…")
print(f"  subject : {subject}")
print(f"  pdf     : {filename}  ({pdf_kb:.0f} KB)")
print(f"  payload : {len(raw)/1024:.1f} KB total")
print(f"  to      : marklangston3@gmail.com, Langstonroy@aol.com")
print()

req = urllib.request.Request(
    "https://api.sendgrid.com/v3/mail/send",
    data=raw,
    headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
    method="POST",
)
try:
    with urllib.request.urlopen(req, timeout=30) as resp:
        print(f"✓ HTTP {resp.status} — message accepted.  Should arrive within 2 minutes.")
except urllib.error.HTTPError as exc:
    body = exc.read().decode(errors="replace")
    print(f"✗ HTTP {exc.code} {exc.reason}")
    try:
        for e in json.loads(body).get("errors", []):
            print(f"  [{e.get('field','?')}] {e.get('message', e)}")
    except Exception:
        print(f"  {body}")
    if exc.code == 403:
        print()
        print("  FIX: marklangston3@gmail.com is not a Verified Sender.")
        print("  Run: Actions → Test SendGrid Email → action=register")
        print("  Then click the verification link in your inbox.")
    elif exc.code == 401:
        print()
        print("  FIX: SENDGRID_API_KEY is invalid or missing 'Mail Send' scope.")
    sys.exit(1)
except Exception as exc:
    print(f"✗ Network error: {exc}")
    sys.exit(1)
PYEOF

      # ── 7. Show log in Actions summary ───────────────────────────────────────
      - name: Print report log (last 100 lines)
        if: always()
        run: |
          echo "### morning_report.log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 morning_report.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(log not found)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 8. Upload PDF + log as artifacts (30-day retention) ──────────────────
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-report-${{ github.run_id }}
          path: |
            reports/morning_report_*.pdf
            morning_report.log
          retention-days: 30
